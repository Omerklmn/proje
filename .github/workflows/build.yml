name: Windows Exe Olustur

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Kutuphaneleri Yukle (Garantili Yontem)
      run: |
        python -m pip install --upgrade pip
        # BURAYA matplotlib EKLEDIK:
        pip install pandas openpyxl pyinstaller packaging matplotlib

    - name: Dosyalari Kontrol Et
      run: |
        dir

    - name: EXE Olustur
      # Dosyalarin yanina .; koyarak Windows formatinda gomuyoruz
      run: |
        pyinstaller --noconsole --onefile --name SatisSimulasyonu --add-data "tasarim.html;." --add-data "logo.webp;." --add-data "grafik_resmi.png;." --add-data "simulasyon_resmi.png;." main.py

    - name: Dosyayi Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: SatisSimulasyonu-EXE
        path: dist/SatisSimulasyonu.exe
        compression-level: 0
